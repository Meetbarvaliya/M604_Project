<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hospital Management System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h2>Hospital Management System</h2>

        <div class="form-section">
            <h3 id="formTitle">Add New Patient</h3>
            <form id="patientForm">
                <input type="hidden" id="patientId">
                <input type="text" id="firstName" placeholder="First Name" required>
                <input type="text" id="lastName" placeholder="Last Name" required>
                <input type="number" id="age" placeholder="Age" required>
                <input type="text" id="diagnosis" placeholder="Diagnosis" required>
                <select id="admissionStatus">
                    <option value="Admitted">Admitted</option>
                    <option value="Discharged">Discharged</option>
                    <option value="Under Observation">Under Observation</option>
                </select>
                <button type="submit" id="saveBtn">Save Patient</button>
                <button type="button" id="clearBtn" onclick="clearForm()">Clear</button>
            </form>
        </div>

        <div class="table-section">
            <h3>Patient Records</h3>
            <table id="patientsTable">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>First Name</th>
                        <th>Last Name</th>
                        <th>Age</th>
                        <th>Diagnosis</th>
                        <th>Status</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="patientTableBody">
                    </tbody>
            </table>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
